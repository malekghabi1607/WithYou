<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Chat Socket.io</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body>

<h2>💬 Test Chat Synchro (Socket.io)</h2>

Salon ID :
<input id="salon" value="test123"><br>

Message :
<input id="msg"><br>

<button onclick="sendMsg()">Envoyer</button>

<hr>
<div id="chat"></div>

<script>

let socket = io("http://localhost:3000");
let salonId = document.getElementById("salon").value;

socket.emit("join_salon", salonId);

socket.on("chat_new_message", data => {
    document.getElementById("chat").innerHTML +=
        `<p><b>${data.user}</b> : ${data.message}</p>`;
});

function sendMsg() {
    const message = document.getElementById("msg").value;

    socket.emit("chat_message", {
        salon: salonId,
        user: "UtilisateurTest",
        message: message
    });

    document.getElementById("msg").value = "";
}
</script>

</body>
</html>
