<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test Synchronisation YouTube (Socket.io)</title>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    button { margin: 4px; }
  </style>
</head>
<body>

<h2>🎬 Test Synchronisation YouTube (Socket.io)</h2>

Salon ID :
<input id="salon" value="test123"><br><br>

Video ID YouTube :
<input id="yt" value="dQw4w9WgXcQ"><br><br>

<button onclick="loadVideo()">Charger</button>
<button onclick="playVideo()">Play</button>
<button onclick="pauseVideo()">Pause</button>
<button onclick="syncTime()">Sync time</button>

<hr>

<div id="player"></div>

<script>
let socket = io("http://localhost:3000");
let player = null;
let salonId = null;
let currentVideoId = null; // ⭐ IMPORTANT pour sauvegarde Laravel

// -----------------------
// YOUTUBE PLAYER
// -----------------------
function onYouTubeIframeAPIReady() {
    player = new YT.Player("player", {
        height: "360",
        width: "640",
        videoId: "",
        events: {
            onReady: () => {
                YT_READY = true;
                console.log("🎥 Lecteur YouTube prêt !");
                loadStateFromLaravel(); // ⭐ CHARGER L’ÉTAT ICI
            }
        }
    });
}

// -----------------------
// SOCKET.IO
// -----------------------
socket.on("connect", () => {
    console.log("🟢 Connecté au serveur Socket.io");
});

socket.on("video_update", (data) => {
    console.log("📡 Reçu du serveur :", data);

    if (!player) return;

    if (data.action === "load") player.loadVideoById(data.videoId);
    if (data.action === "play") player.playVideo();
    if (data.action === "pause") player.pauseVideo();
    if (data.action === "sync" && data.time !== undefined)
        player.seekTo(data.time, true);
});

// -----------------------
// REJOINDRE LE SALON
// -----------------------
function joinSalon() {
    salonId = document.getElementById("salon").value;
    socket.emit("join_salon", salonId);
    console.log("➡️ Salon rejoint :", salonId);
}

joinSalon();

// -----------------------
// SAUVEGARDE LARAVEL
// -----------------------
function sendStateToLaravel(status) {
    const salon = document.getElementById("salon").value;

    fetch(`http://127.0.0.1:8000/api/salon/${salon}/video/state`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("jwt")
        },
        body: JSON.stringify({
            video_id: currentVideoId,
            time: Math.floor(player.getCurrentTime()),
            status: status
        })
    });
}

// -----------------------
// CHARGER L'ÉTAT DE LARAVEL
// -----------------------
async function loadStateFromLaravel() {
    const salon = document.getElementById("salon").value;

    try {
        let res = await fetch(`http://127.0.0.1:8000/api/salon/${salon}/video/state`, {
            headers: {
                "Authorization": "Bearer " + localStorage.getItem("jwt")
            }
        });

        let data = await res.json();
        console.log("📥 État reçu depuis Laravel :", data);

        if (!data.current_video_id) return;

        currentVideoId = data.current_video_id;

        player.loadVideoById(data.current_video_id);

        if (data.video_time) {
            player.seekTo(data.video_time, true);
        }

        if (data.video_status === "playing") {
            player.playVideo();
        }

    } catch (e) {
        console.error("Erreur loadStateFromLaravel:", e);
    }
}

// -----------------------
// BOUTONS
// -----------------------
function loadVideo() {
    currentVideoId = document.getElementById("yt").value;  // ⭐ obligatoire
    socket.emit("video_action", { salon: salonId, action: "load", videoId: currentVideoId });

    sendStateToLaravel("load"); // sauvegarde Laravel
}

function playVideo() {
    socket.emit("video_action", { salon: salonId, action: "play" });
    sendStateToLaravel("play");
}

function pauseVideo() {
    socket.emit("video_action", { salon: salonId, action: "pause" });
    sendStateToLaravel("pause");
}

function syncTime() {
    const t = Math.floor(player.getCurrentTime());
    socket.emit("video_action", { salon: salonId, action: "sync", time: t });
    sendStateToLaravel("sync");
}

// -----------------------
// AU CHARGEMENT
// -----------------------
window.onload = function () {
    joinSalon();           
};

</script>

</body>
</html>
