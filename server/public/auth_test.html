<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Auth API</title>
</head>

<body style="font-family: Arial; padding: 20px;">

<h2>🔐 Test Authentification (Register + Login)</h2>

<h3>Register</h3>
<input id="reg_username" placeholder="username"><br><br>
<input id="reg_email" placeholder="email"><br><br>
<input id="reg_password" placeholder="password" type="password"><br><br>
<button onclick="register()">Register</button>

<hr>

<h3>Login</h3>
<input id="log_email" placeholder="email"><br><br>
<input id="log_password" placeholder="password" type="password"><br><br>
<button onclick="login()">Login</button>

<hr>

<h3>Résultat :</h3>
<pre id="output" style="background:#eee; padding:10px;"></pre>

<script>
const API = "http://127.0.0.1:8000/api";

// REGISTER
async function register() {
    const res = await fetch(`${API}/auth/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: document.getElementById("reg_username").value,
            email: document.getElementById("reg_email").value,
            password: document.getElementById("reg_password").value
        })
    });

    const data = await res.json();
    document.getElementById("output").textContent =
        JSON.stringify(data, null, 2);
}

// LOGIN
async function login() {
    const res = await fetch(`${API}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            email: document.getElementById("log_email").value,
            password: document.getElementById("log_password").value
        })
    });

    const data = await res.json();

    // 🔑 STOCKAGE DU JWT (LA LIGNE QUI MANQUAIT)
    if (data.token) {
        localStorage.setItem("jwt", data.token);
    }

    document.getElementById("output").textContent =
        JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
