<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test Vote Vidéo (Socket.io)</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

<h2>🗳️ Vote temps réel par vidéo</h2>

Salon ID :
<input id="salon" value="test123"><br><br>

<div id="videos"></div>

<script>
const socket = io("http://localhost:3000");
const salonId = document.getElementById("salon").value;

// Simule des vidéos dans un salon
const videos = [
    { id: "vid1", title: "Vidéo 1" },
    { id: "vid2", title: "Vidéo 2" },
    { id: "vid3", title: "Vidéo 3" }
];

// Compteurs locaux
let votes = {
    vid1: 0,
    vid2: 0,
    vid3: 0
};

// Rejoindre le salon
socket.emit("join_salon", salonId);

// Afficher les vidéos
function render() {
    let html = "";
    videos.forEach(v => {
        html += `
            <p>
                ${v.title}
                <button onclick="vote('${v.id}')">Voter</button>
                <span id="count_${v.id}">${votes[v.id]}</span>
            </p>
        `;
    });
    document.getElementById("videos").innerHTML = html;
}

render();

// Envoyer un vote
function vote(videoId) {
    socket.emit("video_vote", {
        salonId: salonId,
        videoId: videoId
  });
}

// Réception des votes
socket.on("video_vote_update", (data) => {
    votes[data.videoId]++;
    document.getElementById("count_" + data.videoId).innerText = votes[data.videoId];
});
</script>

</body>
</html>
